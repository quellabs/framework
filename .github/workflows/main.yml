name: Sync to Public Repos

on:
  push:
    branches: [main]
    tags: ['*.*.*']
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run in dry-run mode (no actual changes)'
        required: false
        default: false
        type: boolean

jobs:
  sync-and-release:
    runs-on: ubuntu-latest
    concurrency:
      group: sync-${{ github.workflow }}-${{ matrix.package }}
      cancel-in-progress: false
    strategy:
      matrix:
        package:
          - contracts
          - support
          - discover
          - dependency-injection
          - sculpt
          - cache
          - objectquel
          - signal-hub
          - annotation-reader
          - canvas
          - canvas-objectquel
          - canvas-smarty
          - canvas-twig
          - canvas-blade
          - canvas-latte
          - canvas-plates
          - canvas-skeleton
          - canvas-database
          - canvas-payments
          - canvas-payments-contracts
          - canvas-payments-mollie
          - canvas-payments-paypal
          - canvas-payments-paypal-express
          - canvas-payments-stripe
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.SYNC_TOKEN }}

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Sync package to public repo
        id: sync
        env:
          DRY_RUN: ${{ github.event.inputs.dry_run == 'true' && 'true' || 'false' }}
        run: |
          set -e

          if [ "$DRY_RUN" = "true" ]; then
            echo "🔍 DRY RUN MODE - No actual changes"
            echo "Would sync ${{ matrix.package }} to public repo"
            echo "split_sha=dry-run" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "📦 Syncing ${{ matrix.package }}..."

          if ! git ls-tree -d HEAD "packages/${{ matrix.package }}" >/dev/null 2>&1; then
            echo "❌ Package directory packages/${{ matrix.package }} does not exist"
            exit 1
          fi

          sha=$(git subtree split --prefix=packages/${{ matrix.package }})

          if [ -z "$sha" ]; then
            echo "❌ git subtree split produced no output"
            exit 1
          fi

          if ! git push \
            "https://${{ secrets.SYNC_TOKEN }}@github.com/quellabs/${{ matrix.package }}.git" \
            "$sha:refs/heads/main"; then
            echo "❌ Sync failed"
            exit 1
          fi

          echo "split_sha=$sha" >> $GITHUB_OUTPUT
          echo "✅ Sync complete"

      - name: Check for release requirement
        id: check_release
        run: |
          echo "🏷️  Checking release for ${{ matrix.package }}..."

          if [ ! -f "versioning/versions.json" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "reason=versions.json not found" >> $GITHUB_OUTPUT
            exit 0
          fi

          target_version=$(jq -r --arg pkg "${{ matrix.package }}" '.[$pkg] // empty' versioning/versions.json)

          if [ -z "$target_version" ] || [ "$target_version" = "null" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "reason=no version specified" >> $GITHUB_OUTPUT
            exit 0
          fi

          if ! [[ "$target_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+.*$ ]]; then
            echo "❌ Invalid version format: $target_version (expected semver without v prefix)"
            exit 1
          fi

          echo "skip=false" >> $GITHUB_OUTPUT
          echo "target_version=$target_version" >> $GITHUB_OUTPUT

      - name: Report skip reason
        if: steps.check_release.outputs.skip == 'true'
        run: |
          case "${{ steps.check_release.outputs.reason }}" in
            "versions.json not found")
              echo "📝 versioning/versions.json not found - skipping release"
              ;;
            "no version specified")
              echo "📝 No version specified for ${{ matrix.package }} - skipping release"
              ;;
          esac

      - name: Get current version from public repo
        id: get_version
        if: steps.check_release.outputs.skip == 'false'
        run: |
          if ! tags_response=$(curl -sf -H "Authorization: token ${{ secrets.SYNC_TOKEN }}" \
            "https://api.github.com/repos/quellabs/${{ matrix.package }}/tags?per_page=100" 2>/dev/null); then
            echo "current_version=0.0.0" >> $GITHUB_OUTPUT
            echo "  Current: 0.0.0 (repo not found or no tags)"
            exit 0
          fi

          current_version=$(echo "$tags_response" \
            | jq -r '.[].name' \
            | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' \
            | sort -V \
            | tail -n 1)

          if [ -z "$current_version" ]; then
            current_version="0.0.0"
          fi

          echo "current_version=$current_version" >> $GITHUB_OUTPUT
          echo "  Current: $current_version"
          echo "  Target:  ${{ steps.check_release.outputs.target_version }}"

      - name: Determine if release needed
        id: version_compare
        if: steps.check_release.outputs.skip == 'false'
        run: |
          version_gt() {
            test "$(printf '%s\n' "$@" | sort -V | head -n 1)" != "$1"
          }

          current="${{ steps.get_version.outputs.current_version }}"
          target="${{ steps.check_release.outputs.target_version }}"

          if version_gt "$target" "$current"; then
            echo "create=true" >> $GITHUB_OUTPUT
            echo "  → New version detected! Releasing $target"
          elif [ "$current" = "$target" ]; then
            echo "create=false" >> $GITHUB_OUTPUT
            echo "  ✅ Already up to date"
          else
            echo "create=false" >> $GITHUB_OUTPUT
            echo "  ⚠️  Target ($target) older than current ($current)"
          fi

      - name: Create and push release tag
        if: steps.version_compare.outputs.create == 'true'
        env:
          DRY_RUN: ${{ github.event.inputs.dry_run == 'true' && 'true' || 'false' }}
          TARGET_VERSION: ${{ steps.check_release.outputs.target_version }}
          SPLIT_SHA: ${{ steps.sync.outputs.split_sha }}
        run: |
          set -e

          if [ "$DRY_RUN" = "true" ]; then
            echo "🔍 DRY RUN: Would tag ${{ matrix.package }} with $TARGET_VERSION"
            exit 0
          fi

          rm -rf "temp-${{ matrix.package }}"

          if ! git clone "https://${{ secrets.SYNC_TOKEN }}@github.com/quellabs/${{ matrix.package }}.git" "temp-${{ matrix.package }}" 2>/dev/null; then
            echo "❌ Failed to clone repository"
            exit 1
          fi

          cd "temp-${{ matrix.package }}"

          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          if ! git cat-file -e "$SPLIT_SHA^{commit}" 2>/dev/null; then
            echo "❌ Commit $SPLIT_SHA not found in repository"
            exit 1
          fi

          if git tag -l | grep -q "^$TARGET_VERSION$"; then
            echo "❌ Tag $TARGET_VERSION already exists"
            cd ..
            rm -rf "temp-${{ matrix.package }}"
            exit 1
          fi

          if ! git tag -a "$TARGET_VERSION" "$SPLIT_SHA" -m "Release $TARGET_VERSION"; then
            echo "❌ Failed to create tag"
            exit 1
          fi

          if ! git push origin "$TARGET_VERSION"; then
            echo "❌ Failed to push tag. Diagnostics:"
            echo "→ Recent commits:"
            git log -3 --oneline || true
            echo "→ Git status:"
            git status || true
            echo "→ Existing tags:"
            git tag --sort=-creatordate | head -5 || true
            cd ..
            rm -rf "temp-${{ matrix.package }}"
            exit 1
          fi

          echo "✅ Tagged ${{ matrix.package }} with $TARGET_VERSION"

          cd ..
          rm -rf "temp-${{ matrix.package }}"

      - name: Summary
        if: always()
        run: echo "🎉 Completed ${{ matrix.package }}"